services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    env:
      - PORT=3000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=dsw
      - DB_PASSWORD=dsw
      - DB_NAME=okiDSW
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://backend:3000/api
    ports:
      - 80:80
    depends_on:
      - backend

  db:
    image: percona/percona-server:latest
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_PASSWORD: dsw
      MYSQL_USER: dsw
      MYSQL_DATABASE: okiDSW
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
