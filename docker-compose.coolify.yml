version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-dsw}
      - DB_PASSWORD=${DB_PASSWORD:-dsw}
      - DB_NAME=${DB_NAME:-okiDSW}
      - JWT_SECRET=${JWT_SECRET}
      - IGDB_CLIENT_ID=${IGDB_CLIENT_ID}
      - IGDB_ACCESS_TOKEN=${IGDB_ACCESS_TOKEN}
      - DEFAULT_SALT_ROUNDS=${DEFAULT_SALT_ROUNDS:-10}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - JWT_COOKIE_SECURE=${JWT_COOKIE_SECURE:-false}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MAIL_FROM=${MAIL_FROM}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=${API_URL:-http://localhost:3000/api}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: percona/percona-server:latest
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_PASSWORD: ${DB_PASSWORD:-dsw}
      MYSQL_USER: ${DB_USER:-dsw}
      MYSQL_DATABASE: ${DB_NAME:-okiDSW}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
