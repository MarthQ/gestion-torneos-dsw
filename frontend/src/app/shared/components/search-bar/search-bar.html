<div
  class="bg-base-300 p-4 rounded-xl border border-gray-700 mb-6 flex flex-wrap gap-4 items-center"
>
  <div class="relative flex-1">
    <input
      type="text"
      placeholder="Buscar por nombre o ID..."
      class="input input-bordered w-full pl-10 border-gray-600 focus:border-indigo-500"
      #searchInput
      (keyup)="query.set(searchInput.value)"
    />
    <span
      class="icon-[material-symbols--search] left-2 top-2 text-gray-500 absolute"
      style="width: 24px; height: 24px"
    ></span>
  </div>
  <button
    class="btn btn-ghost btn-square opacity-50 hover:opacity-100 hover:btn-ghost"
    (click)="clearQuery()"
  >
    <span class="icon-[tabler--reload]" style="width: 24px; height: 24px"></span>
  </button>
</div>
