<div class="drawer lg:drawer-open">
  <input id="my-drawer-4" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content flex flex-col min-h-screen">
    <!-- Navbar -->
    <nav class="navbar w-full bg-base-300">
      <label
        for="my-drawer-4"
        aria-label="open sidebar"
        class="btn btn-square btn-ghost"
        (click)="toggleSidebar()"
      >
        <!-- Sidebar toggle icon -->
        <span
          id="sidebar-toggle"
          class="icon-[weui--arrow-filled] my-1.5 inline-block size-6"
          [class.toggled]="isSidebarToggled()"
        ></span>
      </label>
      <div class="px-4"><h1 id="navbar-title">Okizeme</h1></div>
    </nav>
    <!-- Page content here -->
    <main class="flex-1 p-4">
      <ng-content> </ng-content>
    </main>
    <app-footer class="mt-auto" />
  </div>

  <div class="drawer-side is-drawer-close:overflow-visible">
    <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>
    <div
      class="flex min-h-full flex-col items-start bg-base-200 is-drawer-close:w-14 is-drawer-open:w-64"
    >
      <ul class="menu w-full grow">
        <!-- List item -->

        @for (button of sidebarButtons(); track button.name) {
          <li>
            <button
              class="is-drawer-close:tooltip is-drawer-close:tooltip-right"
              [attr.data-tip]="button.name"
              [routerLink]="button.routerPath"
              routerLinkActive="bg-primary font-bold"
            >
              <span class="{{ button.icon }} my-1.5 inline-block size-4"></span>
              <span class="is-drawer-close:hidden">{{ button.name }}</span>
            </button>
          </li>
        }
        <hr class="opacity-75 my-2" />

        <!-- Implementar collapsable -->

        @if (isAdmin()){
          @for (adminButton of adminSidebarButtons(); track adminButton.name) {
            <li>
              <button
                class="is-drawer-close:tooltip is-drawer-close:tooltip-right"
                [attr.data-tip]="adminButton.name"
                [routerLink]="adminButton.routerPath"
                routerLinkActive="bg-primary font-bold"
              >
                <span class="{{ adminButton.icon }} my-1.5 inline-block size-4"></span>
                <span class="is-drawer-close:hidden">{{ adminButton.name }}</span>
              </button>
            </li>
          }
        }
      </ul>
    </div>
  </div>
</div>
