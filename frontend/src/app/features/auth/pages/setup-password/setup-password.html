<h3 class="text-lg font-bold">Establecer contraseña</h3>
<form [formGroup]="setPasswordForm" (ngSubmit)="onSubmit($event)">
  <fieldset class="fieldset">
    <legend class="fieldset-legend">Email</legend>
    <input
      type="password"
      class="input input-primary border-base-300 input-bordered"
      placeholder="Ingrese la constraseña"
      formControlName="password"
    />
  </fieldset>
  <form-error-label [control]="setPasswordForm.get('password')!"></form-error-label>

  <fieldset class="fieldset">
    <legend class="fieldset-legend">Email</legend>
    <input
      type="password"
      class="input input-primary border-base-300 input-bordered"
      placeholder="Ingrese la constraseña"
      formControlName="passwordConfirm"
    />
  </fieldset>
  <form-error-label [control]="setPasswordForm.get('passwordConfirm')!"></form-error-label>

  @if (setPasswordForm.errors && setPasswordForm.touched) {
    <span class="text-error text-xs">Las contraseñas no son iguales</span>
  }
  <button type="submit" class="btn btn-primary hover:btn-success w-full mt-4">Enviar</button>
</form>
