<h3 class="text-lg font-bold">Establecer contraseña</h3>
<form [formGroup]="setPasswordForm" (ngSubmit)="onSubmit($event)">
  <fieldset class="fieldset">
    <legend class="fieldset-legend">Contraseña</legend>
    <div class="relative">
      <input
            [type]="showPassword ? 'text' : 'password'"
            class="input input-primary border-base-300 input-bordered"
            placeholder="Ingrese la constraseña"
            formControlName="password"
          />
      <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 opacity-60 hover:opacity-100"
        (click)="showPassword = !showPassword">
      <span [class]="showPassword ? 'icon-[mdi--eye-off]' : 'icon-[mdi--eye]'" class="size-5"></span></button>  
    </div>
    
  </fieldset>
  <form-error-label [control]="setPasswordForm.get('password')!"></form-error-label>

  <fieldset class="fieldset">
    <legend class="fieldset-legend">Confirmar contraseña</legend>
    <div class="relative">
      <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            class="input input-primary border-base-300 input-bordered"
            placeholder="Ingrese nuevamente su contraseña"
            formControlName="confirmPassword"
          />
      <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 opacity-60 hover:opacity-100"
        (click)="showConfirmPassword = !showConfirmPassword">
      <span [class]="showConfirmPassword ? 'icon-[mdi--eye-off]' : 'icon-[mdi--eye]'" class="size-5"></span></button>
    </div>
    
  </fieldset>
  <form-error-label [control]="setPasswordForm.get('confirmPassword')!"></form-error-label>

  @if (setPasswordForm.errors && setPasswordForm.touched) {
    <span class="text-error text-xs">Las contraseñas no son iguales</span>
  }
  <button type="submit" class="btn btn-primary hover:btn-success w-full mt-4">Enviar</button>
</form>
