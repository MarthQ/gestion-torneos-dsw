<a routerLink="/explore" class="flex justify-center">
  <h1 class="py-2" id="homeButton">Okizeme</h1>
</a>

<h3 class="text-lg font-bold">Iniciar sesión</h3>

<form [formGroup]="loginForm" (ngSubmit)="onSubmit($event)">
  <fieldset class="fieldset">
    <legend class="fieldset-legend">Email</legend>
    <input
      type="email"
      class="input input-primary border-base-300 input-bordered"
      placeholder="Ingrese el mail del usuario"
      formControlName="email"
    />
  </fieldset>
  <form-error-label [control]="loginForm.get('email')!"></form-error-label>

  <fieldset class="fieldset">
    <legend class="fieldset-legend">Contraseña</legend>
    <div class="relative">
      <input
        [type]="showPassword ? 'text' : 'password'"
        class="input input-primary border-base-300 input-bordered w-full pr-10"
        placeholder="Ingrese la contraseña del usuario"
        formControlName="password"
      />
      <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 opacity-60 hover:opacity-100"
        (click)="showPassword = !showPassword">
        <span [class]="showPassword ? 'icon-[mdi--eye-off]' : 'icon-[mdi--eye]'" class="size-5"></span>
      </button>
    </div>
    <form-error-label [control]="loginForm.get('password')!"></form-error-label>
  </fieldset>

  <button type="submit" class="btn btn-primary hover:btn-success w-full mt-4">
    Iniciar sesión
  </button>
</form>

<p class="mt-4 text-sm">
  ¿Olvidaste tu contraseña?
  <a routerLink="/auth/forgot-password" class="text-primary cursor-pointer">Recuperala acá</a>
</p>
<p class="mt-4 text-sm">
  ¿No tenes cuenta?
  <a routerLink="/auth/register" class="text-primary cursor-pointer">Registrate acá</a>
</p>
