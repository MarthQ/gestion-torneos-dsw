<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
  <div>
    <h1 class="text-3xl font-bold">Gestión de Torneos</h1>
    <h2 class="text-base-content/60">Administra los torneos registrados en el sistema.</h2>
  </div>
  <button class="btn btn-primary shadow-lg" (click)="addTournament()">
    <span class="icon-[ic--baseline-plus] mr-2"></span>
    Nuevo Torneo
  </button>
</div>

<app-search-bar
  [filters]="{
    locations: locationResource.value(),
    games: gameResource.value(),
    tags: tagResource.value(),
  }"
  (queryChanged)="query.set($event)"
  (clear)="query.set('')"
  (queryFiltered)="queryFilters.set($event)"
/>

<div class="overflow-x-auto rounded-xl overflow-hidden shadow-xl">
  <app-data-table
    [columns]="tournamentColumns"
    [data]="tournamentResource.value() ?? []"
    [state]="tableState()"
    [actions]="tournamentActions"
    [pageSize]="pageSize"
    (rowAction)="handleRowAction($event)"
    (retry)="tournamentResource.reload()"
  />
</div>

<app-pagination
  [inputPage]="page()"
  [entityMeta]="tournamentMeta() ?? { total: 0, page: 1, pageSize: pageSize, totalPages: 0 }"
  (currentPage)="pageChangedTo($event)"
/>

@if (
  tournamentResource.hasValue() &&
  gameResource.hasValue() &&
  locationResource.hasValue() &&
  userResource.hasValue() &&
  tagResource.hasValue()
) {
  <tournament-crud-modal
    [tournament]="selectedTournament()"
    [type]="modalType()"
    [open]="openModal()"
    [gameResource]="gameResource.value()"
    [locationResource]="locationResource.value()"
    [userResource]="userResource.value()"
    [tagResource]="tagResource.value()"
    (closed)="openModal.set(false)"
    (confirmAction)="handleCrudAction($event)"
  />
}
