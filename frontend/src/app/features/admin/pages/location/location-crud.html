<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
  <div>
    <h1 class="text-3xl font-bold">Gestión de Localidades</h1>
    <h2 class="text-base-content/60">
      Administra el catálogo de localidades disponibles para torneos y para usuarios.
    </h2>
  </div>
  <button class="btn btn-primary shadow-lg" (click)="addLocation()">
    <span class="icon-[ic--baseline-plus] mr-2"></span>
    Nueva Localidad
  </button>
</div>

<app-search-bar (queryChanged)="query.set($event)" (clear)="query.set('')" />

<app-data-table
  [columns]="locationColumns"
  [data]="locationResource.value() ?? []"
  [state]="tableState()"
  [actions]="locationActions"
  [pageSize]="pageSize"
  (rowAction)="handleRowAction($event)"
  (retry)="locationResource.reload()"
/>

<app-pagination
  [inputPage]="page()"
  [entityMeta]="locationMeta() ?? { total: 0, page: 1, pageSize: pageSize, totalPages: 0 }"
  (currentPage)="pageChangedTo($event)"
/>

@if (locationResource.hasValue()) {
  <location-crud-modal
    [location]="selectedLocation()"
    [type]="modalType()"
    [open]="openModal()"
    (closed)="openModal.set(false)"
    (confirmAction)="handleCrudAction($event)"
  />
}
