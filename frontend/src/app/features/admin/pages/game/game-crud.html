<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
  <div>
    <h1 class="text-3xl font-bold">Gestión de Juegos</h1>
    <h2 class="text-base-content/60">Administra el catálogo de juegos disponibles para torneos.</h2>
  </div>
</div>

<app-search-bar (queryChanged)="query.set($event)" (clear)="query.set('')" />

<app-data-table
  [columns]="gameColumns"
  [data]="gameData()"
  [state]="tableState()"
  [actions]="gameActions"
  [pageSize]="pageSize"
  (rowAction)="handleRowAction($event)"
  (retry)="igdbGameResource.reload()"
/>

<app-pagination
  [inputPage]="page()"
  [entityMeta]="gameMeta() ?? { total: 0, page: 1, pageSize: pageSize, totalPages: 0 }"
  (currentPage)="pageChangedTo($event)"
/>

@if (igdbGameResource.hasValue()) {
  <game-crud-modal
    [game]="selectedGame()"
    [type]="modalType()"
    [open]="openModal()"
    (closed)="openModal.set(false)"
    (confirmAction)="handleCrudAction($event)"
  />
}
