<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
  <div>
    <h1 class="text-3xl font-bold">Gestión de Roles</h1>
    <h2 class="text-base-content/60">
      Administra los roles disponibles para asignar a los usuarios.
    </h2>
  </div>
  <button class="btn btn-primary shadow-lg" (click)="addRole()">
    <span class="icon-[ic--baseline-plus] mr-2"></span>
    Nuevo Rol
  </button>
</div>

<app-search-bar (queryChanged)="query.set($event)" (clear)="query.set('')" />

<app-data-table
  [columns]="roleColumns"
  [data]="roleResource.value() ?? []"
  [state]="tableState()"
  [actions]="roleActions"
  [pageSize]="pageSize"
  (rowAction)="handleRowAction($event)"
  (retry)="roleResource.reload()"
/>

<app-pagination
  [inputPage]="page()"
  [entityMeta]="roleMeta() ?? { total: 0, page: 1, pageSize: pageSize, totalPages: 0 }"
  (currentPage)="pageChangedTo($event)"
/>

@if (roleResource.hasValue()) {
  <role-crud-modal
    [role]="selectedRole()"
    [type]="modalType()"
    [open]="openModal()"
    (closed)="openModal.set(false)"
    (confirmAction)="handleCrudAction($event)"
  />
}
