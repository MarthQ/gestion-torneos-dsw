<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
  <div>
    <h1 class="text-3xl font-bold">Gestión de Regiones</h1>
    <h2 class="text-base-content/60">
      Administra el catálogo de regiones disponibles para torneos y para usuarios.
    </h2>
  </div>
  <button class="btn btn-primary shadow-lg" (click)="addRegion()">
    <span class="icon-[ic--baseline-plus] mr-2"></span>
    Nueva Región
  </button>
</div>

<app-search-bar (queryChanged)="query.set($event)" (clear)="query.set('')" />

<app-data-table
  [columns]="regionColumns"
  [data]="regionResource.value() ?? []"
  [state]="tableState()"
  [actions]="regionActions"
  [pageSize]="pageSize"
  (rowAction)="handleRowAction($event)"
  (retry)="regionResource.reload()"
/>

<app-pagination
  [inputPage]="page()"
  [entityMeta]="regionMeta() ?? { total: 0, page: 1, pageSize: pageSize, totalPages: 0 }"
  (currentPage)="pageChangedTo($event)"
/>

@if (regionResource.hasValue()) {
  <region-crud-modal
    [region]="selectedRegion()"
    [type]="modalType()"
    [open]="openModal()"
    (closed)="openModal.set(false)"
    (confirmAction)="handleCrudAction($event)"
  />
}
