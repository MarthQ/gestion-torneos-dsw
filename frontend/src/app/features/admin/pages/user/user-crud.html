<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
  <div>
    <h1 class="text-3xl font-bold">Gestión de Usuarios</h1>
    <h2 class="text-base-content/60">Administra a los usuarios registrados en el sistema.</h2>
  </div>
  <button class="btn btn-primary shadow-lg" (click)="addUser()">
    <span class="icon-[ic--baseline-plus] mr-2"></span>
    Nuevo Usuario
  </button>
</div>

<app-search-bar
  [filters]="{ locations: locationResource.value(), roles: roleResource.value() }"
  (queryChanged)="query.set($event)"
  (clear)="query.set('')"
  (queryFiltered)="queryFilters.set($event)"
/>

<app-data-table
  [columns]="userColumns"
  [data]="userResource.value() ?? []"
  [state]="tableState()"
  [actions]="userActions"
  [pageSize]="pageSize"
  (rowAction)="handleRowAction($event)"
  (retry)="userResource.reload()"
/>

<app-pagination
  [inputPage]="page()"
  [entityMeta]="userMeta() ?? { total: 0, page: 1, pageSize: pageSize, totalPages: 0 }"
  (currentPage)="pageChangedTo($event)"
/>

@if (userResource.hasValue()) {
  <user-crud-modal
    [user]="selectedUser()"
    [type]="modalType()"
    [open]="openModal()"
    [roleResource]="roleResource"
    [locationResource]="locationResource"
    (closed)="openModal.set(false)"
    (confirmAction)="handleCrudAction($event)"
  />
}
