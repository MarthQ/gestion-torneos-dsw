<dialog #tagModal id="tag_modal" class="modal" (close)="onDialogClose()">
  <div class="modal-box">
    <h3 class="text-lg font-bold">{{ type() | i18nSelect: titleMap }}</h3>
    <form [formGroup]="tagForm">
      @if (type() === 'add' || type() === 'edit') {
        <div class="py-4">
          <fieldset class="fieldset">
            <legend class="fieldset-legend">Nombre de la etiqueta</legend>
            <input
              type="text"
              class="input input-primary border-base-300 input-bordered"
              placeholder="Ingrese el nombre de la etiqueta"
              formControlName="name"
            />
            <form-error-label [control]="tagForm.get('name')!"></form-error-label>
          </fieldset>
          <fieldset class="fieldset">
            <legend class="fieldset-legend">Descripción de la etiqueta</legend>
            <input
              type="text"
              class="input input-primary border-base-300 input-bordered"
              placeholder="Ingrese la descripción de la etiqueta"
              formControlName="description"
            />
            <form-error-label [control]="tagForm.get('description')!"></form-error-label>
          </fieldset>
        </div>
      } @else {
        <p>
          ¿Está seguro de que desea eliminar la etiqueta
          <strong>{{ tagForm.get('name')?.value }}</strong
          >?
        </p>
      }
      <div class="modal-action">
        <form method="dialog" class="flex gap-2">
          @if (type() === 'add' || type() === 'edit') {
            <button class="btn btn-primary" [disabled]="!tagForm.valid" (click)="emitTag()">
              Guardar cambios
            </button>
          } @else {
            <button class="btn btn-primary hover:btn-warning" (click)="emitTag()">
              Borrar Tag
            </button>
          }
          <button class="btn btn-ghost btn-error">Cancelar</button>
        </form>
      </div>
    </form>
  </div>
</dialog>
