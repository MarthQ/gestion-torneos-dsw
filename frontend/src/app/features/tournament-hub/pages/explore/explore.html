<h1 class="font-bold opacity-75 lg:text-3xl">Torneos que te pueden interesar:</h1>
<h2 class="ml-5 mt-0.5">Encontra tu próximo desafio</h2>

<br />
<hr class="opacity-25" stroke="currentColor" />
<br />

<app-search-bar
  [filters]="{
    games: gameResource.value(),
    tags: tagResource.value(),
    status: ['open', 'closed', 'running', 'finished', 'canceled'],
  }"
  (queryChanged)="query.set($event)"
  (clear)="query.set('')"
  (queryFiltered)="queryFilters.set($event)"
/>

<!-- Grid de torneos -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-2">
  <!-- Card 1 -->

  @for (tournament of tournamentResource.value(); track tournament.id) {
    <tournament-card [tournament]="tournament" (hasClicked)="clickedTournament(tournament)" />
  }
</div>

<div class="flex items-center justify-center gap-10">
  <app-pagination [inputPage]="paginationService.currentPage()" [entityMeta]="tournamentMeta()" />

  <app-limit [limit]="limitService.currentLimit()" />
</div>

<br />
<hr class="opacity-25" stroke="currentColor" />
<br />
