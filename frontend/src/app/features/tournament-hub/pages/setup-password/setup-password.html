<div class="flex items-center justify-center h-full">
  <div class="w-full max-w-xs shadow-2xl rounded-2xl p-4 backdrop-blur-md">
    <h3 class="text-lg font-bold">Establecer contraseña</h3>
    <form [formGroup]="setPasswordForm" (ngSubmit)="onSubmit($event)">
      <fieldset class="fieldset">
        <legend class="fieldset-legend">Contraseña</legend>
        <input type="password" class="input input-primary border-base-300 input-bordered"
          placeholder="Ingrese la contraseña" formControlName="password" />
      </fieldset>
      <form-error-label [control]="setPasswordForm.get('password')!"></form-error-label>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Confirmar contraseña</legend>
        <input type="password" class="input input-primary border-base-300 input-bordered"
          placeholder="Ingrese nuevamente su contraseña" formControlName="confirmPassword" />
      </fieldset>
      <form-error-label [control]="setPasswordForm.get('confirmPassword')!"></form-error-label>

      @if (setPasswordForm.errors && setPasswordForm.touched) {
      <span class="text-error text-xs">Las contraseñas no son iguales</span>
      }
      <button type="submit" class="btn btn-primary hover:btn-success w-full mt-4">Enviar</button>
    </form>
  </div>
</div>
